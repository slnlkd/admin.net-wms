<html>

<head>
    <meta name="viewport" content="user-scalable=0,width=device-width,initial-scale=1.0" />
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=0.665, minimum-scale=0.5, maximum-scale=1, user-scalable=no" /> -->
    <!-- <meta name="viewport" content="width=device-width, initial-scale=0.665" /> -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Boxline PDA</title>

    <link rel="stylesheet" href="../../layui/css/layui.css" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="shortcut icon" href="../../assets/icon.png">
    <link rel="stylesheet" href="../../css/adapter.css" />

    <link rel="stylesheet" href="../../css/my.css" />
    <style type="text/css">
        .layui-form-label {
            width: 20%;
        }

        .layui-input-block {
            width: 80%;
            margin-left: 20%;
        }

        .div-tbl-title {
            width: 98%;
            margin: auto;
            /* background-color: #4476A7; */
            height: 30px;
            margin-top: 20px;
        }

        .div-tbl-title table {
            width: 100%;
            height: 30px;
        }

        .div-tbl-title td {
            width: 50%;
            height: 30px;
            line-height: 30px;
        }

        .div-tbl-title span {
            float: left;
            width: 60%;
            height: 30px;
            line-height: 30px;
        }

        .div-tbl-title input {
            float: left;
            width: 40%;
            height: 30px;
            line-height: 30px;
            border: none;
        }

        .layout-tbl-paging {
            margin-top: 0;
        }

        .layout-bill-info {
            height: auto;
        }

        .btn-ok {
            border: none;
            color: #FFFFFF;
            background-color: #0a93e3;
            width: 40%;
            height: 36px;
            border-radius: 5px;
            float: left;
            margin: 0 1%;
            margin-left: 7%;
        }

        .btn-ok:active {
            opacity: 0.8;
        }

        .layout-tab-page {
            height: auto;
        }

        /* 遮罩层 */
        #overlay {
            position: fixed;
            left: 0px;
            top: 0px;
            width: 100%;
            height: 100%;
            font-size: 16px;
            /* IE9以下不支持rgba模式 */
            background-color: rgba(0, 0, 0, 0.5);
            /* 兼容IE8及以下 */
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr=#7f000000, endColorstr=#7f000000);
        }



        /* 弹出框主体 */
        .popup {
            background-color: #ffffff;
            max-width: 400px;
            min-width: 200px;
            height: 150px;
            border-radius: 5px;
            margin: 100px auto;
            text-align: center;
        }

        /* 弹出框的标题 */
        .popup_title {
            height: 30px;
            line-height: 30px;
            border-bottom: solid 1px #cccccc;
        }

        /* 弹出框的内容 */
        .popup_content {
            height: 20px;
            line-height: 20px;
            padding: 5px 10px;
        }

        /* 弹出框的按钮栏 */
        .popup_btn {
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .out-scatter-num .local-ok button {
            margin-left: 0;
        }

        /* 弹出框的按钮 */
        .popup_btn button {
            color: #778899;
            width: 40%;
            height: 40px;
            cursor: pointer;
            border: solid 1px #cccccc;
            border-radius: 5px;
            margin: 5px 10px;
            color: #ffffff;
            background-color: #337ab7;
        }
    </style>
    <link rel="stylesheet" href="../../css/adapter.css" />
</head>

<body>
    <div id="" class="main-content">
        <div id="" class="layout-title" style="">
            <table border="" cellspacing="" cellpadding="">
                <tr>
                    <td class="img-back"><a href="../../index.html"><img src="../../assets/back.jpg"></a></td>
                    <td class="title-text">托盘变更</td>
                    <td class="title-menu-icon"><img id="menuImg" src="../../assets/menu.jpg"></td>
                </tr>
            </table>
        </div>
        <div id="" class="layout-sub-content">

            <div id="" class="layout-bill-info">
                <form class="layui-form" action="" style="height: auto;">

                    <div id="" class="layui-form-item layout-input" style="margin-top: 10px;">
                        <label class="layui-form-label">原托盘条码:</label>
                        <div class="layui-input-block">
                            <input id="PalletNo" type="text" lay-verify="stock" placeholder="托盘条码" autocomplete="off"
                                class="layui-input">
                        </div>
                    </div>

                    <div id="" class="layui-form-item layout-dropdownlist">
                        <label class="layui-form-label" lang>物料明细：</label>
                        <div class="layui-input-block" id="selectMaterial">
                            <select id="bar" lay-filter="bar" lay-search>
                                <option value=""></option>
                            </select>
                            <img src="../../assets/down_arraw.png">
                        </div>
                    </div>
                    <table class="layout-tbl-input" cellspacing="" cellpadding="">
						<tr>
							<td>
								<div id="" class="layui-form-item layout-boxinfo">
									<label class="layui-form-label" lang>物料编号：</label>
									<div class="layui-input-block">
										<input id="SkuNo" type="text" disabled lay-verify="required"
											placeholder="" autocomplete="off" class="layui-input">
									</div>
								</div>
							</td>
							<td>
								<div id="" class="layui-form-item layout-boxinfo">
									<label class="layui-form-label" lang>批次：</label>
									<div class="layui-input-block">
										<input id="LotNo" type="text" disabled lay-verify="required"
											placeholder="" autocomplete="off" class="layui-input">
									</div>
								</div>
							</td>
						</tr>
                        <tr><td>
								<div class="layui-form-item layout-boxinfo">
									<label class="layui-form-label" lang>物料名称：</label>
									<div class="layui-input-block" style="width: 100%;">
										<input id="SkuName" type="text" lay-verify="" disabled placeholder=""
											class="layui-input">
									</div>
								</div>
							</td></tr>
						<tr>
                            
							<td>
								<div class="layui-form-item layout-boxinfo">
									<label class="layui-form-label" lang>数量：</label>
									<div class="layui-input-block">
										<input id="BoxQty" type="text" lay-verify="" disabled placeholder=""
											class="layui-input">
									</div>
								</div>
							</td>
							<td>
								<div class="layui-form-item layout-boxinfo">
									<label class="layui-form-label" lang>已绑数量：</label>
									<div class="layui-input-block">
										<input id="GroupQuantity" type="text" lay-verify="" disabled placeholder=""
											class="layui-input">
									</div>
								</div>
							</td>
						</tr>
					</table>
            </div>
            <div id="" class="layui-form-item layout-input" style="margin-top: 10px;">
                <label class="layui-form-label">新托盘条码:</label>
                <div class="layui-input-block">
                    <input id="PalletNo2" type="text" lay-verify="stock" placeholder="托盘条码" autocomplete="off"
                        class="layui-input">
                </div>
            </div>
            </form>
        </div>
        
            <div id="overlay">
                <div class="popup">
                    <p class="popup_title">绑定</p>
                    <div class="layui-form-item" style="padding-left:20px;padding-top:10px;">
                        <label class="layui-form-label" style="font-size: 15px;">绑定数量：</label>
                        <div class="layui-input-block">
                            <input class="popup_content" id="outScatterQty" type="number">
                        </div>
                    </div>

                    <div class="popup_btn">
                        <button class="cancelBtn" id="cancelBtn">取消</button>
                        <button class="confirmBtn" id="confirmBtn">确认</button>
                    </div>
                </div>
            </div>

            <div id="" class="" style="width: 100%;height: 36px;margin-top: 15px;">
                <button class="btn-ok" id="formBind">绑定数量</button>
                <button id="btnQuery" class="btn-ok" type="button">确认</button>
            </div>
    </div>
    

    <script src="../../js/adaptive.js"></script>
    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/jquery.cookie.js"></script>
    <script src="../../layui/layui.js"></script>
    <script src="../../js/public.js"></script>
    <script src="../../js/language.js"></script>
    <script>
        layui.use(['form', 'jquery'], function () {
            var form = layui.form

            //当前分页
            var curPageIndex = 1
            hidePopup();
            //原托盘条码
            $("#PalletNo").keydown(function (e) {
                var StockCode = $("#PalletNo").val();
                // if(StockCode==''){
                // 	layer.msg('请输入原托盘条码', {
                // 		icon: 2,
                // 		time: 2000 //2秒关闭（如果不配置，默认是3秒）
                // 	}, function () { });
                // 	return;
                // }
                if (e.keyCode === 13) {
                    $("#barMaterial").empty();
                    var param = {
                        "stockCode": StockCode
                    }
                    //验证托盘
                    sendData(IP + "/wmsPda/isEnableOkStockCode", param, 'post', function (res) {
                        // 新项目返回格式：{ code: 1, count: n, msg: "...", data: ... }
                        // 兼容框架可能包装的格式：res.result 或 res.data
                        var result = res.result || res.data || res;
                        if (result.code == 1) { //成功 
                            getExportCodeByID()
                        } else { //不成功
                            layer.msg(result.msg || result.message || "验证失败", {
                                icon: 2,
                                time: 2000 //2秒关闭（如果不配置，默认是3秒）
                            }, function () { });
                        }
                    });
                }
            });

            $("#formBind").click(function (data) {

                $("#outScatterQty").val($("#BoxQty").val())
                showPopup();
            })
            $("#cancelBtn").click(function(data){
                hidePopup();
            })

             $("#confirmBtn").click(function(data){
                let scanVal = $("#outScatterQty").val()
                if(scanVal<0){
                    layer.msg('绑定数量不能小于0', {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						});
						return;
                }
                $("#GroupQuantity").val(scanVal)
                hidePopup();
            })


            function showPopup() {
                var overlay = document.getElementById("overlay");
                overlay.style.display = "block";
            }
            function hidePopup() {
                var overlay = document.getElementById("overlay");
                overlay.style.display = "none";
            }

            function getExportCodeByID() {
                var param = {
                    "stockCode": $("#PalletNo").val(),
                    "isBoxCode": "1"//判断是否有箱码：0：有；1：无
                }
                sendData(IP + "/wmsPda/getMaterialInfoByStockCode", param, 'post', function (res) {
                    // 新项目返回格式：{ code: 1, count: n, msg: "...", data: [...] }
                    // 兼容框架可能包装的格式：res.result 或 res.data
                    var result = res.result || res.data || res;
                    var list = result.data || result.Data || [];
                    if (result.code == 1 && list.length > 0) { //成功
                        $("#bar").empty();
                        for (var i = 0; i < list.length; i++) {
                            var item = list[i];
                            // 兼容字段名大小写
                            var materialId = item.MaterialId || item.materialId || "";
                            var lotNo = item.LotNo || item.lotNo || "";
                            var stockQuantity = item.StockQuantity || item.stockQuantity || 0;
                            var materialName = item.MaterialName || item.materialName || "";
                            var materialCode = item.MaterialCode || item.materialCode || "";
                            var lockQuantity = item.LockQuantity || item.lockQuantity || 0;
                            $("#bar").append(`<option value = ${materialId}-${lotNo}-${stockQuantity}-${materialName}-${materialCode}>${materialName} </option>`);

                            if (i == 0) {
                                $("#SkuNo").val(materialCode);
                                $("#SkuName").val(materialName);
                                $("#LotNo").val(lotNo);
                                $("#BoxQty").val(lockQuantity);
                            }
                        }
                        form.render('select');
                    } else { //不成功
                        //layer.msg(result.msg || result.message || "获取物料信息失败", {
                        //	icon: 2,
                        //	time: 2000 //2秒关闭（如果不配置，默认是3秒）
                        //}, function () { });
                    }

                });
            }


            //2.选择物料
            //获取物料明细
            form.on('select(bar)', function (data) {
                let materInfo = $("#bar").val().split("-");
                $("#SkuNo").val(materInfo[4]);
                $("#SkuName").val(materInfo[3]);
                $("#LotNo").val(materInfo[1]);
                $("#BoxQty").val(materInfo[2]);
            })
        })

        //确认
        $("#btnQuery").click(function () {
            if ($('#PalletNo').val() == '') {
                layer.msg("请输入原托盘条码", {
                    icon: 2,
                    time: 2000 //2秒关闭（如果不配置，默认是3秒）
                }, function () { });
                return;
            }
            if ($('#PalletNo2').val() == '') {
                layer.msg("请输入新托盘号", {
                    icon: 2,
                    time: 2000 //2秒关闭（如果不配置，默认是3秒）
                }, function () { });
                return;
            }

            if ($('#bar').val() == '') {
                layer.msg("请选择物料", {
                    icon: 2,
                    time: 2000 //2秒关闭（如果不配置，默认是3秒）
                }, function () { });
                return;
            }
            if($("#GroupQuantity").val() == ''||$("#GroupQuantity").val()<=0){
                 layer.msg("请绑定数量", {
                    icon: 2,
                    time: 2000 //2秒关闭（如果不配置，默认是3秒）
                }, function () { });
                return;
            }

            let materInfo = $("#bar").val().split("-");
            let lotNo = materInfo[1];
            let materialId = materInfo[0];

            var param = {
                stockCode: $('#PalletNo').val(),
                stockCodeNew: $('#PalletNo2').val(),
                userId: $.cookie('userName'),
                lotNo: lotNo,
                materialId: materialId,
                exportNum: parseFloat($("#GroupQuantity").val()) || 0
            };
            sendData(IP + "/wmsPda/saveUnbindWithNoBoxCode", param, 'post', function (res) {
                // 新项目返回格式：{ code: 1, count: n, msg: "...", data: ... }
                // 兼容框架可能包装的格式：res.result 或 res.data
                var result = res.result || res.data || res;
                if (result.code == 1) { //成功
                    layer.msg(result.msg || result.message || "换绑成功", {
                        icon: 1,
                        time: 2000 //2秒关闭（如果不配置，默认是3秒）
                    }, function () { });
                    $("#PalletNo").val("");
                    $("#bar").empty();
                    $("#SkuNo").val("");
                    $("#LotNo").val("");
                    $("#BoxQty").val("");
                    $("#SkuName").val("");
                    $("#GroupQuantity").val("");
                    $("#PalletNo2").val("");
                    layui.form.render("select");

                } else { //不成功
                    layer.msg(result.msg || result.message || "换绑失败", {
                        icon: 2,
                        time: 2000 //2秒关闭（如果不配置，默认是3秒）
                    }, function () { });
                }
            });
            
        })

        //-----------------------------------------------------------------------------------------

        $("#menuImg").click(function (e) {
            //console.log("menuImg")
            e.stopPropagation()

            if ($("#menuList").is(":hidden")) {
                $("#menuList").show()
            } else {
                $("#menuList").hide()
            }
        })
        $('body').click(function () {
            // //console.log("body")
            $("#menuList").hide()
        })
    </script>
</body>

</html>
