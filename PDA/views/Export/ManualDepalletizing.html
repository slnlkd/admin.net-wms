		/* 弹出框主体 */

	<script>
		layui.use(['form', 'jquery'], function () {

			var statusint = 1;
			var form = layui.form

			initLanguage()
			setLanguage()

			//当前分页
			var curPageIndex = 1

			function clear() {
				$("#ExportQuantity").val("");
				$("#GroupQuantity").val("");
				$("#MaterialCode").val("");
				$("#MaterialName").val("");
				$("#LotNo").val("");
				$("#ImportQty").val("");
				$("#qty").val("");
			}
			form.on('select(getbar)', function (data) {
				// layui select 事件中，data.value 是选中的值
				var selectedValue = data.value || $("#bar").val();
				console.log("选择出库订单:", selectedValue);
				if (!selectedValue || selectedValue === "") {
					console.log("出库订单为空，不清空明细");
					return;
				}
				refreshTable(selectedValue);
				$("#MaterialCode").val("");
				$("#MaterialName").val("");
				$("#LotNo").val("");
				$("#qty").val("");
				$("#outScatterQty").val("");
				$("#BOXCODE").val("");
			});

			$("#menuImg").click(function (e) {
				e.stopPropagation()

				if ($("#menuList").is(":hidden")) {
					$("#menuList").show()
				} else {
					$("#menuList").hide()
				}
			})
			$('body').click(function () {
				$("#menuList").hide()
			})

			$('#btnScanBox').click(function () {
				if ($("#BOXCODE").val().replace(/[, ]/g, '') == "" || $("#BOXCODE").val().replace(/[, ]/g, '') == null || $("#BOXCODE").val().replace(/[, ]/g, '') == undefined) {
					layer.msg("请输入箱码!", {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					}, function () { });
					return;
				}
				checkBoxInfo();
			})

			$("#selectDiv").click(function () {
				var input = $('select[id="bar"]').next().find('.layui-select-title input')
				var val = input.val()
			})
			
			function refreshTable(orderNo) {
				// 检查参数
				if (!orderNo || orderNo === "") {
					console.log("refreshTable: orderNo 为空");
					return;
				}
				//先清空一下箱子列表
				let trs = $("#tableBoxList tr")
				let len = trs.length
				for (i = len - 1; i >= 2; i--) {
					trs[i].remove();
				}
				//设置托盘号
				$("#palletCode").val($("#STOCKCODE").val().replace(/[, ]/g, ''));
				var param = {
					"trayCode": $("#STOCKCODE").val().replace(/[, ]/g, ''),
					"exportOrderNo": orderNo

				}
				console.log("refreshTable 调用参数:", param);

				sendData(IP + "/wmsPda/getTrayInfo", param, 'post', function (res) {
					// 新项目返回格式：{ code: 1, count: 1, msg: "...", flag: "...", data: {...} }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					console.log("getTrayInfo 返回:", result);
					if (result.code == 1) { //成功
						console.log("getTrayInfo data:", result.data);
						// 兼容字段名大小写
						var data = result.data;
						$("#ExportQuantity").val(data.ExportQuantity || data.exportQuantity);
						$("#GroupQuantity").val(data.GroupQuantity || data.groupQuantity);

					} else {
						if ($("#STOCKCODE").val() === "") {
							return;
						}
						layer.msg(result.msg || result.message, {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () {
							//回调
							$("#ExportQuantity").val("")
							$("#GroupQuantity").val("")
							$("#BOXCODE").val("").focus();
						});
					}
				})
				// return;
				sendData(IP + "/wmsPda/getManualDepalletizing", param, 'post', function (res) {
					// 新项目返回格式：{ code: 1, count: n, msg: "...", data: [...] }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					console.log("getManualDepalletizing 返回:", JSON.stringify(result));
					console.log("result.count:", result.count, "result.data:", result.data);
					
					// 检查是否有数据：兼容 count > 0 或 data 是数组且长度 > 0
					var hasData = false;
					var list = null;
					if (result.data && Array.isArray(result.data)) {
						list = result.data;
						hasData = list.length > 0;
					} else if (result.count > 0 && result.data) {
						list = Array.isArray(result.data) ? result.data : [result.data];
						hasData = list.length > 0;
					}
					
					if (hasData) { //成功
						console.log("有数据，列表长度:", list.length);
						var arrTrs = new Array()
						let idx = 0;
						// 使用 for 循环遍历数组，而不是 for...in
						for (var i = 0; i < list.length; i++) {
							var item = list[i];
							console.log("处理第", i, "项:", item);
							var tr = $("#boxCell").eq(0).clone();
							tr.appendTo("#tableBoxList");
							// 兼容字段名大小写
							var boxCode = item.BoxCode || item.boxCode || "";
							var materialName = item.MaterialName || item.materialName || "";
							var scanQty = item.ScanQty || item.scanQty || "";
							tr.attr('id', boxCode)
							idx++;
							tr.attr('index', idx)
							tr.find("td[name='BoxCode']").html(boxCode);
							tr.find("td[name='MaterialName']").html(materialName);
							tr.find("td[name='ScanQty']").html(scanQty);
							var code = boxCode
							tr.find("td[name='del']").click(function () {
								var elem = $(this).parent()
								var BoxCode = elem.attr('id')
								layer.alert("确定要删除吗？<br>" + BoxCode, {
									icon: 2,
									time: 0, //2秒关闭（如果不配置，默认是3秒）
									btn: ['删除', '取消'],
									yes: function (index) {
										layer.close(index);
										var param = {
											trayCode: $("#STOCKCODE").val().replace(/[, ]/g, ''),
											exportOrderNo: $("#bar").val(),
											boxCode: BoxCode
										};
										// console.log(param);return;
										sendData(IP + "/wmsPda/removeManual", param, 'post', function (res) {
											// 新项目返回格式：{ success: true/false, message: "..." }
											// 兼容框架可能包装的格式：res.result 或 res.data
											var result = res.result || res.data || res;
											if (result.success === true || result.code == 1) { //成功
												//layer.msg(result.message || result.msg, {
												//icon: 1,
												//time: 1000 //2秒关闭（如果不配置，默认是3秒）
												//}, function () {
												//});
												$("#BOXCODE").val("");
												//elem.remove();
												refreshTable($("#bar").val());
											} else { //不成功
												layer.msg(result.message || result.msg, {
													icon: 2,
													time: 2000 //2秒关闭（如果不配置，默认是3秒）
												}, function () { });
											}
										});
									}
								})
							})
							tr.show();
							arrTrs[i] = tr
						}

						//设置分页
						setPages(1, list.length)
					} else { //不成功
						console.log("无数据或数据格式不正确");
						//layer.msg("无数据", {
						//	icon: 2,
						//	time: 2000 //2秒关闭（如果不配置，默认是3秒）
						//}, function () { });
						$("#boxNum").val(0)
						setPages(1, 0)
					}
				});
			}

			//设置分页
			function setPages(pageIndex, boxNum) {
				if (boxNum <= 0) {
					//列表为空，隐藏分页页码
					$("#tableBoxPages").hide()
					return
				}

				let pageNum = Math.floor(boxNum / 10);
				if (boxNum % 10 > 0) {
					pageNum += 1;
				}
				$("#tableBoxPages").find("tr").remove()
				let table = $("#tableBoxPages")
				$("<tr></tr>").appendTo("#tableBoxPages")
				$("<td id='prevPage' class='page-prev'>上一页</td>").appendTo("#tableBoxPages tr")
				$("#tableBoxPages tr").eq(0).find("td[id^='prevPage']").click(function () {
					onClickPrevPage()
				})
				for (i = 1; i < pageNum + 1; i++) {
					$("<td class='page-num'>" + i + "</td>").appendTo("#tableBoxPages tr")
				}
				$("<td id='nextPage' class='page-next'>下一页</td>").appendTo("#tableBoxPages tr")
				$("#tableBoxPages tr").eq(0).find("td[id^='nextPage']").click(function () {
					onClickNextPage()
				})
				$("#tableBoxPages").show()

				setCurPage(1)
			}

			//设置当前分页
			function setCurPage(pageIndex) {
				let totalTrNum = $("#tableBoxList tr").length
				if (totalTrNum <= 2) {
					return
				}

				let pageNum = getBoxPageNum()
				if (pageIndex > pageNum) {
					return
				}

				let startIndex = (pageIndex - 1) * 10 + 1
				let n = totalTrNum - startIndex
				let endIndex = 0
				if (n > 9) {
					endIndex = startIndex + 9
				} else {
					endIndex = startIndex + n
				}
				let trs = $("#tableBoxList tr")
				let d = 0
				for (let i = 2; i < trs.length; i++) {
					let t = trs.eq(i)
					d = t.attr('index')
					if (d >= startIndex && d <= endIndex) {
						//显示行
						t.show()
					} else {
						//隐藏行
						t.hide()
					}
				}

				curPageIndex = pageIndex

				let ptr = $("#tableBoxPages tr")
				for (let i = 1; i < pageNum + 1; i++) {
					ptr.eq(0).find("td").eq(i).removeClass("page-num-select")
					if (i == curPageIndex) {
						ptr.eq(0).find("td").eq(i).addClass("page-num-select")
					}
				}
			}

			function onClickPrevPage() {
				if (curPageIndex == 1) {

				setCurPage(curPageIndex - 1)
			}

			function onClickNextPage() {
				let n = getBoxPageNum()
				if (curPageIndex == n) {

				setCurPage(curPageIndex + 1)
			}

			function getBoxPageNum() {
				let num = $("#tableBoxList tr").length
				if (num <= 2) {
					return 0
				}

				let pageNum = Math.floor(num / 10);
				if (num % 10 > 0) {
					pageNum += 1;
				}

				return pageNum
