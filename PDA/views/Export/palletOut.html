<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="user-scalable=0,width=device-width,initial-scale=1.0" />
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Boxline PDA</title>

	<link rel="stylesheet" href="../../layui/css/layui.css" />
	<link rel="stylesheet" href="../../css/style.css" />
	<script src="../../js/adaptive.js"></script>

	<link rel="stylesheet" href="../../css/my.css" />
	<style type="text/css">
		.layout-bill-info {
			height: 255px;
		}

		.layout-tbl-submit {
			margin-top: 10px;
		}

		.btn-req-location button {
			color: #FFFFFF;
			background-image: url(assets/btn_blue.jpg);
			width: 228px;
			height: 100%;
			border: none;
			margin-left: 80px;
		}

		.btn-out {
			width: 60%;
			height: 36px;
			margin-left: 21%;
		}
	</style>
	<link rel="stylesheet" href="../../css/adapter.css" />
</head>

<body>
	<div class="main-content">
		<div class="layout-title">
			<table>
				<tr>
					<td class="img-back"><a href="../../index.html"><img src="../../assets/back.jpg"></a></td>
					<td class="title-text">空托出库</td>
					<td class="title-menu-icon"><img id="menuImg" src="../../assets/menu.jpg"></td>
				</tr>
			</table>
		</div>
		<div class="layout-sub-content">
			<div id="menuList" class="menu">
				<ul class="" style="text-align: center;">
					<li><a href="../../index.html">主页</a></li>
					<li><a href="../../login.html">重新登录</a></li>
				</ul>
			</div>
			<div class="layout-bill-info">
				<form class="layui-form">
					<div id="layout-pallet" class="layui-form-item layout-input" style="margin-top: 10px;">
						<label class="layui-form-label">载具垛数：</label>
						<div class="layui-input-block">
							<input id="STOCKCODE" type="text" lay-verify="stock" placeholder="载具垛数" autocomplete="off"
								class="layui-input">
						</div>
					</div>
					<div id="layout-bill" class="layui-form-item layout-dropdownlist">
						<label class="layui-form-label">出库口：</label>
						<div class="layui-input-block" id="selectDiv">
							<select id="bar" lay-filter="getbar" lay-verify="required" lay-search>
								<option value=""></option>
							</select>
							<img src="../../assets/down_arraw.png">
						</div>
					</div>
					<div class="btn-out">
						<button id="btnOut" class="layout-btn layout-btn-blue" type="button">出库</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script src="../../js/jquery-3.5.1.min.js"></script>
	<script src="../../layui/layui.js"></script>
	<script src="../../js/public.js"></script>
	<script src="../../js/jquery.cookie.js"></script>
	<script>
		layui.use(['form', 'jquery'], function () {
			var form = layui.form

			//当前分页
			var curPageIndex = 1
			var exitCode = ""

			function clear() {
				$("#ImportQuantity").val("");
				$("#ImportFactQuantity").val("");
				$("#GoodsCode").val("");
				$("#GoodsName").val("");
				$("#LotNo").val("");
				$("#ImportQty").val("");
				$("#qty").val("");
			}

			//是否存在某个入库单
			function hasBill(list, billcode) {
				for (var i = 0; i < list.length; i++) {
					if (list[i].ImportBillCode == billcode) {
						return true
					}
				}
				return false
			}

			//根据箱码，从入库单中查询这个类型的产品的信息并赋值显示
			function setOrderGoods(billInfo, goodsCode) {
				$("#ImportQuantity").val('');
				$("#ImportFactQuantity").val('');
				for (var i = 0; i < billInfo.length; i++) {
					if (billInfo[i].GoodsCode == goodsCode) {
						$("#ImportQuantity").val(billInfo[i].ImportQuantity);
						$("#ImportFactQuantity").val(billInfo[i].ImportCompleteQuantity);
					}
				}
			}

			form.on('select(getbar)', function (data) {
				exitCode = data.value || $("#bar").val();
				console.log('Selected export port:', exitCode);
			});

			$("#menuImg").click(function (e) {
				e.stopPropagation()

				if ($("#menuList").is(":hidden")) {
					$("#menuList").show()
				} else {
					$("#menuList").hide()
				}
			})
			$('body').click(function () {
				$("#menuList").hide()
			})

			$('#btnScanBox').click(function () {
				$("#ImportQuantity").val('');
				$("#ImportFactQuantity").val('');
				$("#GoodsCode").val("");
				$("#GoodsName").val("");
				$("#LotNo").val("");
				$("#ImportQty").val("");
				$("#qty").val("");
				$("#BOXCODE").val("");
				$("#BOXCODE").focus();
			})

			$('#btnOut').click(function () {
				if ($('#STOCKCODE').val() == '') {
					layer.msg("请输入载具垛数", {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					}, function () { });
					return
				}
				var input = $('select[id="bar"]').next().find('.layui-select-title input')
				var val = input.val()
				if (val == '') {
					layer.msg("请选择出库口", {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					}, function () { });
					return
				}

				if (exitCode == "") {
					layer.msg("请选择出库口", {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					}, function () { });
					return
				}

				var param = {
					num: parseInt($('#STOCKCODE').val()) || 1, // 解析为整数，默认1
					exportPort: exitCode
				};
				sendData(IP + "/wmsPda/AddOutPalno", param, 'post', function (res) {
					// 新项目返回格式：{ code, count, msg, data }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.code == 1) { //成功
						layer.msg(result.msg || result.message, {
							icon: 1,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { 
							// 成功后清空输入
							$('#STOCKCODE').val('');
							exitCode = '';
							$("#bar").val('');
							form.render('select');
						});
					} else { //不成功
						layer.msg(result.msg || result.message, {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});
			})

			$("#selectDiv").click(function () {
				var input = $('select[id="bar"]').next().find('.layui-select-title input')
				var val = input.val()
				$("#bar").empty()
				$("#bar").append('<option value =>' + '</option>');
				form.render('select');

				// 新接口不需要参数
				sendData(IP + "/wmsPda/GetExportPortList", {}, 'post', function (res) {
					// 新项目返回格式：{ code, count, msg, data }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					// 兼容字段名大小写：Code 或 code，TypeName 或 typeName
					var dataList = result.data || result.Data || [];
					if (result.code == 0 || result.code == 1) { //成功（原接口成功时code=0，新接口可能为0或1）
						for (var i = 0; i < dataList.length; i++) {
							// 兼容字段名大小写
							var code = dataList[i].Code || dataList[i].code;
							var typeName = dataList[i].TypeName || dataList[i].typeName;
							$("#bar").append('<option value="' + code + '">' + typeName + '</option>');
						}
						form.render('select');

						if (!val) {
							$('#bar').siblings("div.layui-form-select").find('dl').find('.layui-select-tips').addClass('layui-this')
						} else {
							var sel = 'dd[lay-value=' + val + ']';
							$('#bar').siblings("div.layui-form-select").find('dl').find(sel).addClass('layui-this')
						}
						$('select[id="bar"]').next().addClass('layui-form-selected')
						$('select[id="bar"]').next().find('.layui-select-title input').val(val)
					} else { //不成功
						layer.msg(result.msg || result.message, {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});
			})
			function onClickPrevPage() {
				if (curPageIndex == 1) {
					return
				}
				setCurPage(curPageIndex - 1)
			}

			function onClickNextPage() {
				let n = getBoxPageNum()
				if (curPageIndex == n) {
					return
				}
				setCurPage(curPageIndex + 1)
			}

			//检查载具状态
			function checkPalletStat() {
				var param = {
					palletCode: $("#STOCKCODE").val()
				}
				sendData(IP + "/wmsPda/getPalnoStatus", param, 'post', function (res) {
					// 新项目返回格式：{ valid: true/false, message: "..." }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.valid === true || result.message == "有效载具") { //成功
						$.cookie('stockCode', $("#STOCKCODE").val());
						// refreshTable() // 空托出库页面不需要刷新表格
						$("#STOCKCODE").focus();
					} else { //不成功
						layer.msg(result.message || "无效载具", {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});
			}
			var boxId = 0;
			// 注意：此表单提交处理可能与空托出库无关，保留以兼容可能的其他功能
			form.on('submit(formBind)', function (data) {
				if (!$("#bar").val()) {
					layer.msg('请选择入库单', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}
				if (!$("#STOCKCODE").val()) {
					layer.msg('请扫描载具条码', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}
				if (!$("#BOXCODE").val()) {
					layer.msg('请扫描外箱条码', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}
				if (!$("#GoodsCode").val()) {
					layer.msg('物料编号不能为空', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}
				var param = {
					orderNo: $("#bar").val(),
					parentCode: $("#STOCKCODE").val(),
					boxCode: $("#BOXCODE").val(),
					goodId: $("#GoodsCode").val(),
					lotNo: $("#LotNo").val()
				}
				sendData(IP + "/wmsPda/backConfirm", param, 'post', function (res) {
					// 新项目返回格式：{ success: true/false, message: "..." }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.success === true || result.code == 1) { //成功 
						layer.msg(result.message || result.msg, {
							icon: 1,
							time: 1000 //2秒关闭（如果不配置，默认是3秒）
						}, function () {
							// refreshTable() // 空托出库页面不需要刷新表格
						});
					} else { //不成功
						layer.msg(result.message || result.msg, {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () {
							//回调
						});
					}
				});
				return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
			});
			form.verify({
				stock: [/^[\S]{6}$/, '载具条码必须为六位字符']
			});
		})
	</script>
</body>

</html>
