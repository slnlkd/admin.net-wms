<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="user-scalable=0,width=device-width,initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Boxline PDA</title>

	<link rel="stylesheet" href="../../layui/css/layui.css" />
	<link rel="stylesheet" href="../../css/style.css" />
	<script src="../../js/adaptive.js"></script>

	<link rel="stylesheet" href="../../css/my.css" />
	<style type="text/css">
		.layout-bill-info {
			height: 255px;
		}

		.layout-tbl-submit {
			margin-top: 10px;
		}
	</style>
	<link rel="stylesheet" href="../../css/adapter.css" />
</head>

<body>
	<div class="main-content">
		<div class="layout-title">
			<table>
				<tr>
					<td class="img-back"><a href="../../index.html"><img src="../../assets/back.jpg"></a></td>
					<td class="title-text">空托入库</td>
					<td class="title-menu-icon"><img id="menuImg" src="../../assets/menu.jpg"></td>
				</tr>
			</table>
		</div>
		<div class="layout-sub-content">
			<div id="menuList" class="menu">
				<ul class="" style="text-align: center;">
					<li><a href="../../index.html">主页</a></li>
					<li><a href="../../login.html">重新登录</a></li>
				</ul>
			</div>

			<div class="layout-bill-info">
				<form class="layui-form">
					<div id="layout-pallet" class="layui-form-item layout-input">
						<label class="layui-form-label">入库数量：</label>
						<div class="layui-input-block">
							<input id="palletNum" type="text" lay-verify="stock" placeholder="入库载具数量" autocomplete="off"
								class="layui-input">
						</div>
					</div>
					<div id="layout-boxcode" class="layui-form-item layout-input">
						<label class="layui-form-label">载具条码：</label>
						<div class="layui-input-block">
							<input id="STOCKCODE" type="text" placeholder="请扫描载具条码" autocomplete="off"
								class="layui-input">
						</div>
					</div>
					<!-- <div id="layout-boxcode" class="layui-form-item layout-input" hidden>
						<label class="layui-form-label">条码校验：</label>
						<div class="layui-input-block">
							<input id="STOCKCODEV" type="text" placeholder="请扫描绑定载具条码" autocomplete="off"
								class="layui-input">
						</div>
					</div> -->
					<div style="margin-left: 21%; width: 38%;float: left;">
						<button id="btnScanBox" class="layout-btn layout-btn-blue" lay-submit lay-filter="formBind"
							type="button">绑定</button>
					</div>
					<div style="width: 38%;float: left;">
						<button id="btnScanBox" class="layout-btn layout-btn-red" lay-submit lay-filter="formUnbind"
							type="button">解绑</button>
					</div>

				</form>
			</div>
		</div>
	</div>


	<script src="../../js/jquery-3.5.1.min.js"></script>
	<script src="../../layui/layui.js"></script>
	<script src="../../js/public.js"></script>
	<script src="../../js/jquery.cookie.js"></script>
	<script>
		layui.use(['form', 'jquery'], function () {
			var form = layui.form
			$("#menuImg").click(function (e) {
				e.stopPropagation()

				if ($("#menuList").is(":hidden")) {
					$("#menuList").show()
				} else {
					$("#menuList").hide()
				}
			})
			$('body').click(function () {
				$("#menuList").hide()
			})

			//检查载具状态
			function checkPalletStat() {
				var param = {
					"palletCode": $("#STOCKCODE").val()
				}
				sendData(IP + "/wmsPda/getPalnoStatus", param, 'post', function (res) {
					// 新项目返回格式：{ valid: true/false, message: "有效载具"/"无效载具" }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.valid === true || result.message == "有效载具") { //成功
						$.cookie('stockCode', $("#STOCKCODE").val());
						$("#palletNum").val(1);
					} else { //不成功
						$("#palletNum").val("入库载具数量");
						layer.msg("无效载具", {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});
			}

			// $("#bar").focus();
			$("#STOCKCODE").keydown(function (e) {
				if (e.keyCode === 13) {

					if ($("#STOCKCODE").val() == "") {
						return
					}
					//检查载具状态
					checkPalletStat();
				}
			});
			form.on('submit(formBind)', function (data) {
				if (!$("#STOCKCODE").val()) {
					layer.msg('请扫描载具条码', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}

				if (!$("#palletNum").val()) {
					layer.msg('请输入载具数量', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}

				var param = {
					"palletCode": $("#STOCKCODE").val()
				}
				sendData(IP + "/wmsPda/getPalnoStatus", param, 'post', function (res) {
					//console.log("载具状态："+res.message)
					// 新项目返回格式：{ valid: true/false, message: "有效载具"/"无效载具" }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.valid === true || result.message == "有效载具") { //成功
						$.cookie('stockCode', $("#STOCKCODE").val());
						bind()
					} else { //不成功
						layer.msg("无效载具", {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});

				return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
			});

			function bind() {
				var param = {
					palletCode: $("#STOCKCODE").val(),
					quantity: parseInt($("#palletNum").val()) || 1,
					actionType: 'add',
					user: $.cookie('userName')
				}
				sendData(IP + "/wmsPda/kBackConfirm", param, 'post', function (res) {
					//console.log("请求空托入库： res is "+JSON.stringify(res));
					// 新项目返回格式：{ success: true/false, message: "..." }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.success === true || result.code == 1) { //成功 
						layer.msg(result.message || result.msg, {
							icon: 1,
							time: 1000 //2秒关闭（如果不配置，默认是3秒）
						}, function () {
						});
						$("#STOCKCODE").val(''),
							$("#palletNum").val('')
					} else { //不成功
						layer.msg(result.message || result.msg, {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () {
							//回调
						});
					}
				});
			}

			form.on('submit(formUnbind)', function (data) {
				if (!$("#STOCKCODE").val()) {
					layer.msg('请扫描载具条码', {
						icon: 2,
						time: 2000 //2秒关闭（如果不配置，默认是3秒）
					});
					return;
				}
				var param = {
					"palletCode": $("#STOCKCODE").val()
				}
				sendData(IP + "/wmsPda/getPalnoStatus", param, 'post', function (res) {
					//console.log("载具状态："+res.message)
					// 新项目返回格式：{ valid: true/false, message: "有效载具"/"无效载具" }
					// 兼容框架可能包装的格式：res.result 或 res.data
					var result = res.result || res.data || res;
					if (result.valid === true || result.message == "有效载具") { //成功
						$.cookie('stockCode', $("#STOCKCODE").val());
						unbind()
					} else { //不成功
						layer.msg("无效载具", {
							icon: 2,
							time: 2000 //2秒关闭（如果不配置，默认是3秒）
						}, function () { });
					}
				});

				return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
			});
			function unbind() {
				layer.msg('该操作会解绑这个载具上的所有载具，确定要解绑吗？', {
					time: 0 //不自动关闭
					, btn: ['确定解绑', '取消']
					, icon: 7
					, yes: function (index) {
						layer.close(index);

						var param = {
							palletCode: $("#STOCKCODE").val(),
							quantity: 0,
							actionType: 'del',
							user: $.cookie('userName')
						}
						sendData(IP + "/wmsPda/kBackConfirm", param, 'post', function (res) {
							// 新项目返回格式：{ success: true/false, message: "..." }
							// 兼容框架可能包装的格式：res.result 或 res.data
							var result = res.result || res.data || res;
							if (result.success === true || result.code == 1) { //成功 
								layer.msg(result.message || result.msg, {
									icon: 1,
									time: 1000 //2秒关闭（如果不配置，默认是3秒）
								}, function () {
								});
								$("#STOCKCODE").val('')
								$("#palletNum").val('')
							} else { //不成功
								layer.msg(result.message || result.msg, {
									icon: 2,
									time: 2000 //2秒关闭（如果不配置，默认是3秒）
								}, function () {
									//回调
								});
							}
						});
					}
				});
			}
		})
	</script>
</body>

</html>
