services:
  redis:
    image: redis:7-alpine
    container_name: adminnet-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-AdminNetRedis@2026}"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/data:/data
      - ./redis/logs:/logs
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-AdminNetRedis@2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: adminnet-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      ASPNETCORE_ENVIRONMENT: Production
      MARIADB_HOST: ${MARIADB_HOST:-8.155.168.138}
      MARIADB_PORT: ${MARIADB_PORT:-3306}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-jc44}
      MARIADB_USER: ${MARIADB_USER:-app_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-CHANGE_ME}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-AdminNetRedis@2026}
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /bin/bash
      - /app/start-backend.sh
    ports:
      - "${BACKEND_PORT:-9102}:5005"
    volumes:
      - ./app/Configuration:/config-template:ro
      - ./app/start-backend.sh:/app/start-backend.sh:ro
      - ./app/wait-for-it.sh:/app/wait-for-it.sh:ro
      - ./data/backend/upload:/app/wwwroot/upload
      - ./data/backend/avatar:/app/wwwroot/avatar
      - ./data/backend/signature:/app/wwwroot/signature
      - ./data/backend/codeGen:/app/wwwroot/CodeGen
      - ./data/backend/logs:/app/logs

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: adminnet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-9100}:80"
