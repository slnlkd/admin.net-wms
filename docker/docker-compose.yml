services:
  mysql:
    image: mysql:8.0
    container_name: adminnet-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin_net_wms}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-AdminNet@2026}
    ports:
      - "9101:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-AdminNet@2026}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: adminnet-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-AdminNetRedis@2026}"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/data:/data
      - ./redis/logs:/logs
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-AdminNetRedis@2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: adminnet-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - /bin/bash /app/wait-for-it.sh mysql:3306 -t 180 -- /bin/bash /app/wait-for-it.sh redis:6379 -t 180 -- dotnet Admin.NET.Web.Entry.dll
    ports:
      - "${BACKEND_PORT:-9102}:5005"
    volumes:
      - ./app/Configuration:/app/Configuration:ro
      - ./app/wait-for-it.sh:/app/wait-for-it.sh:ro
      - ./data/backend/upload:/app/wwwroot/upload
      - ./data/backend/avatar:/app/wwwroot/avatar
      - ./data/backend/signature:/app/wwwroot/signature
      - ./data/backend/codeGen:/app/wwwroot/CodeGen
      - ./data/backend/logs:/app/logs

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: adminnet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-9100}:80"
